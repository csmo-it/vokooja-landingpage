<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  
  <!-- Abstract AI/Agent Symbol -->
  <g fill="white">
    <!-- Central node -->
    <circle cx="256" cy="256" r="40"/>
    
    <!-- Three orbiting nodes -->
    <circle cx="256" cy="140" r="24"/>
    <circle cx="356" cy="314" r="24"/>
    <circle cx="156" cy="314" r="24"/>
    
    <!-- Connection lines -->
    <rect x="248" y="164" width="16" height="92" rx="8"/>
    <rect x="264" y="270" width="80" height="16" rx="8" transform="rotate(30 264 278)"/>
    <rect x="168" y="270" width="80" height="16" rx="8" transform="rotate(-30 168 278)"/>
  </g>
  
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.3"/>
</svg>
